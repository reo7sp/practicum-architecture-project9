version: '3.8'

services:
  keycloak_db:
    image: postgres:14
    environment:
      POSTGRES_DB: keycloak_db
      POSTGRES_USER: keycloak_user
      POSTGRES_PASSWORD: keycloak_password
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak_user -d keycloak_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5433:5432"

  openldap:
    image: osixia/openldap:1.5.0
    environment:
      LDAP_ORGANISATION: BionicPRO
      LDAP_DOMAIN: example.com
      LDAP_ADMIN_PASSWORD: admin
      LDAP_CONFIG_PASSWORD: admin
      LDAP_TLS: "false"
    command: --copy-service
    volumes:
      - ./ldap/config.ldif:/container/service/slapd/assets/config/bootstrap/ldif/50-bionicpro.ldif:ro
    ports:
      - "1389:389"
      - "1636:636"

  keycloak:
    image: quay.io/keycloak/keycloak:21.1
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak_db:5432/keycloak_db
      KC_DB_USERNAME: keycloak_user
      KC_DB_PASSWORD: keycloak_password
    command:
      - start-dev
      - --import-realm
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
    ports:
      - "8080:8080"
    depends_on:
      keycloak_db:
        condition: service_healthy
      openldap:
        condition: service_started

  bionicpro-auth:
    build:
      context: ./bionicpro-auth
      dockerfile: Dockerfile
    environment:
      LISTEN_ADDR: :8000
      PUBLIC_BASE_URL: http://localhost:8000
      FRONTEND_BASE_URL: http://localhost:3000
      KEYCLOAK_PUBLIC_URL: http://localhost:8080
      KEYCLOAK_INTERNAL_URL: http://keycloak:8080
      KEYCLOAK_REALM: reports-realm
      KEYCLOAK_CLIENT_ID: bionicpro-auth
      KEYCLOAK_CLIENT_SECRET: bionicpro-auth-secret
      SESSION_TTL: 30m
      SESSION_ENCRYPTION_SECRET: super-secret-session-key-change-me
      COOKIE_SECURE: "false"
      COOKIE_SAME_SITE: lax
      PROFILE_STORE_PATH: /app/data/profiles.db
    volumes:
      - bionicpro_auth_data:/app/data
    ports:
      - "8000:8000"
    depends_on:
      - keycloak

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:8000
    depends_on:
      - bionicpro-auth

volumes:
  bionicpro_auth_data:
  keycloak_db_data:
