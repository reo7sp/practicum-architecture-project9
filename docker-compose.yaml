services:
  crm_db:
    image: postgres:14
    environment:
      POSTGRES_DB: crm_db
      POSTGRES_USER: crm_user
      POSTGRES_PASSWORD: crm_password
    command: ["postgres", "-c", "wal_level=logical", "-c", "max_replication_slots=5", "-c", "max_wal_senders=5", "-c", "max_worker_processes=10"]
    volumes:
      - crm_db_data:/var/lib/postgresql/data
      - ./db/crm_init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crm_user -d crm_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5434:5432"

  crm-db-cdc-init:
    image: postgres:14
    depends_on:
      crm_db:
        condition: service_healthy
    volumes:
      - ./db/crm_cdc_init.sql:/scripts/crm_cdc_init.sql:ro
    entrypoint:
      - /bin/sh
      - -c
      - PGPASSWORD=crm_password psql -h crm_db -U crm_user -d crm_db -f /scripts/crm_cdc_init.sql

  telemetry_db:
    image: postgres:14
    environment:
      POSTGRES_DB: telemetry_db
      POSTGRES_USER: telemetry_user
      POSTGRES_PASSWORD: telemetry_password
    volumes:
      - telemetry_db_data:/var/lib/postgresql/data
      - ./db/telemetry_init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U telemetry_user -d telemetry_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5435:5432"

  olap_db:
    image: clickhouse/clickhouse-server:24.8
    environment:
      CLICKHOUSE_DB: olap_db
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: clickhouse_password
    volumes:
      - olap_db_data:/var/lib/clickhouse
      - ./db/olap_init.sql:/docker-entrypoint-initdb.d/olap_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user default --password clickhouse_password --query 'SELECT 1'"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "8123:8123"
      - "9000:9000"

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio12345
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "9002:9000"
      - "9001:9001"

  minio-init:
    image: minio/mc:RELEASE.2025-03-12T17-29-24Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minio minio12345 &&
      mc mb --ignore-existing local/bionicpro-reports &&
      mc anonymous set download local/bionicpro-reports
      "

  cdn:
    image: nginx:1.29-alpine
    depends_on:
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    volumes:
      - ./cdn/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - cdn_cache:/var/cache/nginx
    ports:
      - "8082:8080"

  keycloak_db:
    image: postgres:14
    environment:
      POSTGRES_DB: keycloak_db
      POSTGRES_USER: keycloak_user
      POSTGRES_PASSWORD: keycloak_password
    volumes:
      - keycloak_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak_user -d keycloak_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5433:5432"

  openldap:
    image: osixia/openldap:1.5.0
    environment:
      LDAP_ORGANISATION: BionicPRO
      LDAP_DOMAIN: example.com
      LDAP_ADMIN_PASSWORD: admin
      LDAP_CONFIG_PASSWORD: admin
      LDAP_TLS: "false"
    command: --copy-service
    volumes:
      - ./ldap/config.ldif:/container/service/slapd/assets/config/bootstrap/ldif/50-bionicpro.ldif:ro
    ports:
      - "1389:389"
      - "1636:636"

  keycloak:
    image: quay.io/keycloak/keycloak:21.1
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak_db:5432/keycloak_db
      KC_DB_USERNAME: keycloak_user
      KC_DB_PASSWORD: keycloak_password
    command:
      - start-dev
      - --import-realm
    volumes:
      - ./keycloak/realm.json:/opt/keycloak/data/import/realm-export.json
    ports:
      - "8080:8080"
    depends_on:
      keycloak_db:
        condition: service_healthy
      openldap:
        condition: service_started

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log

  kafka:
    image: confluentinc/cp-kafka:7.5.1
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "cub kafka-ready -b localhost:9092 1 20"]
      interval: 10s
      timeout: 10s
      retries: 10

  debezium:
    image: debezium/connect:2.3
    depends_on:
      kafka:
        condition: service_healthy
      crm_db:
        condition: service_healthy
      crm-db-cdc-init:
        condition: service_completed_successfully
    environment:
      BOOTSTRAP_SERVERS: kafka:9092
      GROUP_ID: 1
      CONFIG_STORAGE_TOPIC: debezium-connect-configs
      OFFSET_STORAGE_TOPIC: debezium-connect-offsets
      STATUS_STORAGE_TOPIC: debezium-connect-status
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      KEY_CONVERTER_SCHEMAS_ENABLE: "false"
      VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      REST_ADVERTISED_HOST_NAME: debezium
      PLUGIN_PATH: /kafka/connect
    ports:
      - "8083:8083"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/"]
      interval: 10s
      timeout: 5s
      retries: 10

  debezium-init:
    image: curlimages/curl:latest
    depends_on:
      debezium:
        condition: service_healthy
    volumes:
      - ./debezium/register-connectors.sh:/scripts/register-connectors.sh:ro
      - ./debezium/crm-connector.json:/debezium/crm-connector.json:ro
    entrypoint: ["/scripts/register-connectors.sh"]

  bionicpro-auth:
    build:
      context: ./bionicpro-auth
      dockerfile: Dockerfile
    environment:
      LISTEN_ADDR: :8000
      PUBLIC_BASE_URL: http://localhost:8000
      FRONTEND_BASE_URL: http://localhost:3000
      KEYCLOAK_PUBLIC_URL: http://localhost:8080
      KEYCLOAK_INTERNAL_URL: http://keycloak:8080
      KEYCLOAK_REALM: reports-realm
      KEYCLOAK_CLIENT_ID: bionicpro-auth
      KEYCLOAK_CLIENT_SECRET: bionicpro-auth-secret
      SESSION_TTL: 30m
      SESSION_ENCRYPTION_SECRET: super-secret-session-key-change-me
      COOKIE_SECURE: "false"
      COOKIE_SAME_SITE: lax
      PROFILE_STORE_PATH: /app/data/profiles.db
      OLAP_CLICKHOUSE_HOST: olap_db
      OLAP_CLICKHOUSE_PORT: "8123"
      OLAP_CLICKHOUSE_USER: default
      OLAP_CLICKHOUSE_PASSWORD: clickhouse_password
      OLAP_CLICKHOUSE_DATABASE: olap_db
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: minio
      S3_SECRET_KEY: minio12345
      S3_BUCKET: bionicpro-reports
      S3_REGION: us-east-1
      CDN_PUBLIC_URL: http://localhost:8082
    volumes:
      - bionicpro_auth_data:/app/data
    ports:
      - "8000:8000"
    depends_on:
      - keycloak
      - olap_db
      - minio
      - cdn

  airflow:
    image: apache/airflow:2.9.1-python3.11
    environment:
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      AIRFLOW__WEBSERVER__RBAC: "true"
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
      _PIP_ADDITIONAL_REQUIREMENTS: psycopg2-binary==2.9.10 clickhouse-connect==0.8.15
      CRM_DSN: dbname=crm_db user=crm_user password=crm_password host=crm_db port=5432
      TELEMETRY_DSN: dbname=telemetry_db user=telemetry_user password=telemetry_password host=telemetry_db port=5432
      OLAP_CLICKHOUSE_HOST: olap_db
      OLAP_CLICKHOUSE_PORT: "8123"
      OLAP_CLICKHOUSE_USER: default
      OLAP_CLICKHOUSE_PASSWORD: clickhouse_password
      OLAP_CLICKHOUSE_DATABASE: olap_db
      AIRFLOW_UID: "50000"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - airflow_data:/opt/airflow
    command: standalone
    ports:
      - "8081:8080"
    depends_on:
      crm_db:
        condition: service_healthy
      telemetry_db:
        condition: service_healthy
      olap_db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:8000
    depends_on:
      - bionicpro-auth

volumes:
  bionicpro_auth_data:
  cdn_cache:
  crm_db_data:
  keycloak_db_data:
  telemetry_db_data:
  olap_db_data:
  kafka_data:
  zookeeper_data:
  zookeeper_log:
  airflow_data:
  minio_data:
