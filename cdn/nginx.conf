proxy_cache_path /var/cache/nginx/reports levels=1:2 keys_zone=reports_cache:10m max_size=256m inactive=1h use_temp_path=off;

server {
    listen 8080;
    server_name localhost;
    access_log /dev/stdout combined;
    resolver 127.0.0.11 valid=30s;

    location /reports/ {
        proxy_cache reports_cache;
        proxy_cache_lock on;
        proxy_cache_valid 200 1h;
        proxy_cache_valid 404 1m;
        proxy_ignore_headers Set-Cookie;
        proxy_hide_header Access-Control-Allow-Origin;
        proxy_hide_header Access-Control-Allow-Methods;
        proxy_hide_header Access-Control-Allow-Headers;
        add_header X-Cache-Status $upstream_cache_status always;
        add_header Cache-Control "public, max-age=3600, immutable" always;
        add_header Access-Control-Allow-Origin http://localhost:3000 always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        proxy_set_header Host minio:9000;
        proxy_pass http://minio:9000/bionicpro-reports$request_uri;
    }
}
